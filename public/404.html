<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Personal Portfolio</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: #1e293b;
        --text-main: #f8fafc;
        --text-sub: #94a3b8;
        --border-color: #334155;
        --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        overflow: hidden;
      }
      .blur-aura {
        position: absolute;
        top: 25%;
        left: 25%;
        width: 300px;
        height: 300px;
        background-color: rgba(99, 102, 241, 0.15);
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 1;
      }
      .card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 1.5rem;
        padding: 2.5rem;
        width: 100%;
        max-width: 440px;
        text-align: center;
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
        position: relative;
        z-index: 10;
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      .heading-404 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 6rem;
        font-weight: 800;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
        margin-bottom: 1rem;
        letter-spacing: -2px;
      }
      h2 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }
      p {
        color: var(--text-sub);
        font-size: 0.875rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        padding: 0.875rem;
        background-color: #6366f1;
        background: var(--primary-gradient);
        border: none;
        border-radius: 0.75rem;
        color: white;
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
      }
      .btn:hover {
        opacity: 0.95;
      }
      .btn:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="blur-aura"></div>
    <div class="card">
      <div class="heading-404">404</div>
      <h2>Page Not Found</h2>
      <p>The page you are looking for does not exist, has been removed, or is temporarily unavailable. Let's get you back to the main portfolio!</p>
      <a href="/" class="btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Portfolio
      </a>
    </div>

    <!-- Smart Auto Redirect Fallback -->
    <script>
      // If deployed as a sub-path on GitHub Pages, auto-route back to the root subpath if needed
      const currentPath = window.location.pathname;
      if (currentPath !== '/' && !currentPath.endsWith('.html')) {
        console.log('Redirecting helper active...');
      }
    </script>
  </body>
</html>
